<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>러닝 분석</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 18px;
            opacity: 0.9;
        }
        .form-section {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .form-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
        }
        .form-group input[type="number"], .form-group select {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .form-group input[type="number"]::placeholder {
            color: rgba(255,255,255,0.6);
        }
        .analyze-btn {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .results-section {
            display: none;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .results-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffd700;
        }
        .probability-bar {
            margin-bottom: 25px;
        }
        .probability-bar label {
            font-size: 18px;
            margin-bottom: 10px;
            display: block;
        }
        .probability-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 40px;
            position: relative;
            overflow: hidden;
        }
        .probability-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #8BC34A 100%);
            transition: width 1s ease-out;
        }
        .probability-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
        }
        .risk-meter {
            margin-bottom: 25px;
        }
        .risk-meter label {
            font-size: 18px;
            margin-bottom: 10px;
            display: block;
        }
        .risk-container {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 40px;
            position: relative;
            overflow: hidden;
        }
        .risk-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50 0%, #FFEB3B 50%, #F44336 100%);
            transition: width 1s ease-out;
        }
        .risk-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
        }
        .recommendation {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .recommendation h3 {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 15px;
        }
        .recommendation ul {
            list-style: none;
        }
        .recommendation li {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            opacity: 0.8;
        }
        .nav-button {
            display: block;
            width: 200px;
            margin: 0 auto 30px auto;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .nav-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        .metric-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .metric-card h3 {
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 10px;
        }
        .metric-card p {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏃‍♂️ 러닝 분석</h1>
            <p class="subtitle">레이스 완주 확률 & 붕괴 리스크 분석</p>
        </header>

        <div class="form-section">
            <h2>📊 러닝 정보 입력</h2>
            <div class="form-group">
                <label>종목 선택</label>
                <select id="sport" onchange="calculateAnalysis()">
                    <option value="5k">5km 달리기</option>
                    <option value="10k">10km 달리기</option>
                    <option value="half">하프 마라톤 (21.1km)</option>
                    <option value="full">풀 마라톤 (42.2km)</option>
                    <option value="trail_21">21km 트레일</option>
                    <option value="trail_42">42km 트레일</option>
                </select>
            </div>
            <div class="form-group">
                <label>현재 기록 (분 단위)</label>
                <input type="number" id="currentRecord" placeholder="예: 35" onchange="calculateAnalysis()">
            </div>
            <div class="form-group">
                <label>최근 주간 달린 거리 (km)</label>
                <input type="number" id="weeklyDistance" placeholder="예: 35" onchange="calculateAnalysis()">
            </div>
            <div class="form-group">
                <label>현재 피로도 (1-10)</label>
                <input type="number" id="fatigue" min="1" max="10" placeholder="예: 5" onchange="calculateAnalysis()">
            </div>
            <div class="form-group">
                <label>현재 체중 (kg)</label>
                <input type="number" id="weight" placeholder="예: 70" onchange="calculateAnalysis()">
            </div>
            <div class="form-group">
                <label>현재 심박수 (평균)</label>
                <input type="number" id="heartRate" placeholder="예: 160" onchange="calculateAnalysis()">
            </div>
            <button class="analyze-btn" onclick="calculateAnalysis()">분석 시작</button>
        </div>

        <div id="results" class="results-section">
            <h2>📈 분석 결과</h2>
            
            <div class="metric-card">
                <h3 id="completionRate">--%</h3>
                <p>레이스 완주 확률</p>
            </div>
            
            <div class="risk-meter">
                <label>붕괴 리스크</label>
                <div class="risk-container">
                    <div class="risk-fill" id="riskFill" style="width: 0%"></div>
                    <div class="risk-text" id="riskText">--%</div>
                </div>
            </div>

            <div class="metric-card">
                <h3 id="recoveryDays">--일</h3>
                <p>추천 회복 기간</p>
            </div>

            <div class="recommendation">
                <h3>💡 분석 및 추천</h3>
                <ul id="recommendationList">
                    <li>분석 결과를 보려면 정보를 입력하세요.</li>
                </ul>
            </div>
        </div>

        <a href="index.html" class="nav-button">🏠 홈페이지로</a>

        <footer>
            <p>made by 🦞 na-na (OpenClaw)</p>
            <p>러닝 분석 앱</p>
        </footer>
    </div>

    <script>
        function calculateAnalysis() {
            // 입력 값 가져오기
            const sport = document.getElementById('sport').value;
            const currentRecord = parseInt(document.getElementById('currentRecord').value) || 0;
            const weeklyDistance = parseInt(document.getElementById('weeklyDistance').value) || 0;
            const fatigue = parseInt(document.getElementById('fatigue').value) || 5;
            const weight = parseInt(document.getElementById('weight').value) || 0;
            const heartRate = parseInt(document.getElementById('heartRate').value) || 0;

            // 레이스 기록 가져오기
            const raceRecords = {
                '5k': 35,    // 5km 달리기 (35분)
                '10k': 60,   // 10km 달리기 (60분)
                'half': 100, // 하프 마라톤 (100분)
                'full': 200, // 풀 마라톤 (200분)
                'trail_21': 120, // 21km 트레일 (120분)
                'trail_42': 240  // 42km 트레일 (240분)
            };

            const targetRecord = raceRecords[sport];

            // 1. 완주 확률 계산
            let probability = 50; // 기본값

            if (currentRecord > 0) {
                const recordDiff = targetRecord - currentRecord;
                const recordRatio = Math.min(recordDiff / targetRecord, 1); // 기록 비율
                probability += recordRatio * 40; // 기록 비율 기여도 (더 크게)
            }

            const distanceRatio = Math.min(weeklyDistance / 50, 1); // 주간 거리 비율
            probability += distanceRatio * 20;

            const fatigueFactor = 10 - fatigue; // 피로도 반대
            probability += fatigueFactor * 3;

            const weightFactor = Math.max(40 - weight, 0); // 체중 기여도
            probability += weightFactor * 1;

            const hrFactor = Math.max(180 - heartRate, 0); // 심박수 기여도
            probability += hrFactor * 0.5;

            // 상한/하한 제한
            probability = Math.max(20, Math.min(95, probability));

            // 2. 붕괴 리스크 계산
            let risk = 30;
            risk += fatigue * 4;
            risk += (targetRecord - currentRecord) * 0.5;
            risk -= weeklyDistance * 0.3;
            risk -= (weight > 0 ? (weight - 50) * 0.2 : 0);
            risk -= heartRate * 0.1;

            risk = Math.max(10, Math.min(90, risk));

            // 3. 회복 기간 계산
            let recoveryDays = fatigue + Math.ceil((targetRecord - currentRecord) / 10);
            recoveryDays = Math.max(2, Math.min(14, recoveryDays));

            // 결과 업데이트
            document.getElementById('completionRate').textContent = Math.round(probability) + '%';
            document.getElementById('riskFill').style.width = Math.round(risk) + '%';
            document.getElementById('riskText').textContent = Math.round(risk) + '%';
            document.getElementById('recoveryDays').textContent = recoveryDays + '일';

            // 리스크 색상
            const riskText = document.getElementById('riskText');
            if (risk < 30) {
                riskText.style.color = '#4CAF50';
            } else if (risk < 60) {
                riskText.style.color = '#FFEB3B';
            } else {
                riskText.style.color = '#F44336';
            }

            // 추천 사항
            let recommendations = [];

            if (probability > 80) {
                recommendations.push('✅ 완주 확률 매우 높습니다! 최적의 상태입니다.');
            } else if (probability > 60) {
                recommendations.push('✅ 완주 가능성이 높습니다.');
            } else {
                recommendations.push('⚠️ 완주 확률이 낮습니다. 추가 조치가 필요합니다.');
            }

            if (risk < 30) {
                recommendations.push('✅ 붕괴 리스크가 낮습니다.');
            } else if (risk < 60) {
                recommendations.push('⚠️ 붕괴 리스크가 중간 수준입니다.');
            } else {
                recommendations.push('❌ 붕괴 리스크가 높습니다. 즉시 휴식이 필요합니다.');
            }

            if (fatigue >= 8) {
                recommendations.push('💡 현재 피로도가 높습니다. 하루 이상 휴식하세요.');
            }

            if (weeklyDistance < 30) {
                recommendations.push('💡 주간 달린 거리가 부족합니다. 30km 이상 달리기를 추천합니다.');
            }

            if (currentRecord > 0 && currentRecord > targetRecord + 30) {
                recommendations.push('💡 현재 기록이 레이스 기록보다 느립니다. 속도 향상이 필요합니다.');
            }

            recommendations.push(`💡 회복 기간: ${recoveryDays}일`);

            // 추천 목록 업데이트
            const list = document.getElementById('recommendationList');
            list.innerHTML = recommendations.map(r => `<li>${r}</li>`).join('');

            // 결과 섹션 표시
            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
